<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Appointment Form</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

    <div class="form-container">
        
        <h1>Doctor Appointment Form</h1>
        <hr>

        <form>
            <div class="form-group">
                <label>Appointment Date</label>
                <input type="date">
            </div>

            <div class="form-group">
                <label>Appointment Time</label>
                <input type="time">
            </div>

            <div class="form-group">
                <label>Name</label>
                <input type="text" placeholder="First">
                <input type="text" placeholder="Last">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label>Male</label>
                    <input type="radio" name="gender">
                    <label>Female</label>
                    <input type="radio" name="gender">
                </div>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="tel" placeholder="####">
            </div>

            <div class="form-group">
                <label>Address</label>
                <input type="text" placeholder="city">
                <input type="text" placeholder="state">
            </div>

            <div class="form-group">
                <label>Your Query</label>
                <textarea rows="4" cols="40"></textarea>
            </div>

            <div class="form-group align-top">
                <label>Appointment Type</label>
                <div class="checkbox-list">
                    <p>Select which appointment type(s) you require</p>
                    <label><input type="checkbox"> Cervix checkup</label>
                    <label><input type="checkbox"> Heart checkup</label>
                    <label><input type="checkbox"> Eye check-up</label>
                    <label><input type="checkbox"> Hearing Test</label>
                </div>
            </div>

            <button type="submit">Send</button>
        </form>
    </div>

</body>
</html>
